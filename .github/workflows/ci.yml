name: CI

on:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  build-and-core-test:
    name: Build and core test (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            at-spi2-core \
            dbus \
            dbus-user-session \
            libadwaita-1-dev \
            libgtk-4-dev \
            libgtksourceview-5-dev \
            libspelling-1-dev \
            webp-pixbuf-loader \
            xvfb

      - name: Build project
        run: swift build

      - name: Run core test suites
        run: |
          xvfb-run -a dbus-run-session -- bash -lc \
            "swift test --filter 'CLICommandTests|CLITests|MainWindowActionsTests|MainWindowCoreTests|MarkdownFormattingTests|NoteModelAndRendererTests|RepositoryStateTests|SettingsStoreTests' --no-parallel"

      - name: Run MarkdownPreview widget tests
        run: |
          xvfb-run -a dbus-run-session -- bash -lc \
            "swift test --filter 'MarkdownPreviewWidgetTests' --no-parallel"

  build-macos:
    name: Build on macOS
    runs-on: macos-26
    # Verifies the package compiles against the Homebrew GTK4 / libadwaita /
    # libspelling stack on Apple Silicon. Tests are NOT run in CI: GitHub-
    # hosted macOS runners are headless (no WindowServer session), and the
    # GTK4 Quartz backend installs Cocoa runloop observers at `gtk_init`
    # time that corrupt the autorelease pool on subsequent test methods in
    # a headless process. The XCTest mirror suite under
    # `Tests/SwiftyNotesTests/macOS/` passes locally in a normal GUI
    # session — see CONTRIBUTING.md for the local invocation.

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      # macos-26's default Xcode is 26.2 (Swift 6.2). Pick 26.4.1 to match
      # the swift-tools-version in Package.swift and what local devs use.
      - name: Select Xcode 26.4.1 (Swift 6.3)
        run: sudo xcode-select -s /Applications/Xcode_26.4.1.app

      - name: Install GTK + libspelling stack via Homebrew
        run: brew install libadwaita gtksourceview5 libspelling pkgconf

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Build test bundle
        # Compile-only — exercises the XCTest mirror sources and catches
        # Swift type errors without trying to execute the suite headlessly.
        run: swift build --build-tests

      - name: Build Xcode .app target
        # Catches drift between SwiftPM and the packaging/macos Xcode
        # project (xcconfig changes, target memberships, asset catalog
        # references, etc.) that `swift build` alone wouldn't notice.
        # We only build Debug here — Release additionally exercises
        # codesign + bundling which belong to the release workflow,
        # not CI. Sign as the ad-hoc identity (`CODE_SIGN_IDENTITY=-`)
        # so the build doesn't try to find a Developer ID certificate
        # that doesn't exist on the runner.
        run: |
          xcodebuild \
            -project packaging/macos/swiftynotes.xcodeproj \
            -scheme swiftynotes \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM= \
            build

  ui-smoke-tests:
    name: UI smoke tests
    runs-on: ubuntu-24.04
    needs: build-and-core-test

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install smoke test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            at-spi2-core \
            dbus \
            dbus-user-session \
            libadwaita-1-dev \
            libgtk-4-dev \
            libgtksourceview-5-dev \
            libspelling-1-dev \
            python3-pyatspi \
            weston

      - name: Run Wayland smoke tests
        run: |
          dbus-run-session -- bash -lc \
            "swift test --filter 'UISmokeTests' --no-parallel"
